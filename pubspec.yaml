name: reqable_mcp_server
description: Reqable MCP Server is a command-line tool for connecting your AI to Reqable.
version: 1.0.0
# repository: https://github.com/my_org/my_repo

environment:
  sdk: '>=3.0.0 <4.0.0'

# Add regular dependencies here.
dependencies:
  args: ^2.4.0
  http: ^1.2.2
  mcp_dart: ^2.2.1
  path: ^1.8.2
  pubspec_parse: ^1.2.3

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0

# Override dependencies for sdk 3.3.4 compatibility
dependency_overrides:
  crypto: 3.0.3
  meta: 1.16.0
  http: 1.2.2
